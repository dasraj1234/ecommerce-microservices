spring:
  application:
    name: authN_Z
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb?TimeZone=Asia/Kolkata
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata